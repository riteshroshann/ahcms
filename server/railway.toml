# Railway deployment — backend only
# This file is read by Railway automatically

[build]
builder = "NIXPACKS"
buildCommand = "npm install"

[deploy]
startCommand = "node index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"

[[services]]
name = "cw-hostel-api"
